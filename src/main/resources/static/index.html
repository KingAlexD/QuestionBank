<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Question Bank System</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <header class="topbar">
    <h1>Online Question Bank</h1>
    <button id="themeToggle" class="btn secondary" type="button">Toggle Dark Mode</button>
  </header>

  <main class="container">
    <section id="authSection" class="panel">
      <h2>Student Access</h2>
      <div class="auth-grid">
        <form id="registerForm" class="card">
          <h3>Register</h3>
          <label>Full Name <input id="registerName" required /></label>
          <label>Email <input id="registerEmail" type="email" required /></label>
          <label>Password <input id="registerPassword" type="password" minlength="4" required /></label>
          <button class="btn" type="submit">Create Account</button>
        </form>

        <form id="loginForm" class="card">
          <h3>Login</h3>
          <label>Email <input id="loginEmail" type="email" required /></label>
          <label>Password <input id="loginPassword" type="password" required /></label>
          <button class="btn" type="submit">Sign In</button>
        </form>
      </div>
      <p id="authMessage" class="message"></p>
    </section>

    <section id="dashboardSection" class="panel hidden">
      <div class="row-between">
        <h2 id="welcomeText"></h2>
        <button id="logoutBtn" class="btn secondary" type="button">Logout</button>
      </div>
      <p>Question bank seeded with <strong id="questionCount"></strong> Java questions.</p>
      <div class="row-between wrap">
        <button id="startQuizBtn" class="btn" type="button">Start Random Quiz (20 Questions)</button>
      </div>
    </section>

    <section id="quizSection" class="panel hidden">
      <h2>Quiz</h2>
      <form id="quizForm"></form>
      <div class="row-between wrap">
        <button id="submitQuizBtn" class="btn" type="button">Submit Quiz</button>
        <button id="cancelQuizBtn" class="btn secondary" type="button">Cancel</button>
      </div>
      <p id="quizMessage" class="message"></p>
    </section>

    <section id="resultSection" class="panel hidden">
      <h2>Latest Result</h2>
      <div id="resultCard" class="card"></div>
    </section>

    <section id="historySection" class="panel hidden">
      <h2>Result History</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Score</th>
              <th>Total</th>
              <th>Percentage</th>
            </tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/js/questions.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
